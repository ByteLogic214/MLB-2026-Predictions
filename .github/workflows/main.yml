name: MLB Unitary Pipeline

on:
  schedule:
    - cron: '0 15-23 * * *'   # 15-23 UTC = 10am-6pm Mexico City
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y build-essential python3-dev

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install MLB-StatsAPI

      - name: Create required directories
        run: mkdir -p src/logs data/raw data/processed

      - name: Run MLB Predictions + Telegram
        working-directory: ./src
        run: python inference_pipeline.py
        env:
          QROQ_API_KEY: ${{ secrets.QROQ_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Save predictions to repo
        run: |
          git config --global user.name 'Cleo AI Bot'
          git config --global user.email 'cleo-ai@bytelogic214.dev'
          git add data/processed/predictions_final.csv || true
          git commit -m "Predictions update [skip ci]" || echo "No changes"
          git push || echo "Nothing to push"
