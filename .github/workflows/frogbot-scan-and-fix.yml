name: Frogbot Scan and Fix

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  security-events: write

jobs:
  create-fix-pull-requests:
    name: Scan project with Frogbot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Frogbot
        uses: jfrog/frogbot@v2
        env:
          # Optional:
          # If your project requires an install command (npm, yarn, pnpm, dotnet, etc.),
          # uncomment and adjust the following line.
          #
          # JF_INSTALL_DEPS_CMD: npm ci

          # Mandatory
          JF_URL: ${{ secrets.JF_URL }}

          # Mandatory if JF_USER/JF_PASSWORD are not used
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}

          # Mandatory if using username/password authentication instead
          # JF_USER: ${{ secrets.JF_USER }}
          # JF_PASSWORD: ${{ secrets.JF_PASSWORD }}

          # Mandatory
          JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Optional
          # JF_RELEASES_REPO: ""

          # Optional
          # JF_DEPS_REPO: ""
