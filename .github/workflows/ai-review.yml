name: MLB Model Quality & Code Review

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - '**.py'      # Solo analiza cambios en código Python
      - 'models/**'  # Opcional: si tienes archivos de configuración de modelos

jobs:
  ai-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Groq AI Review
        uses: flow-ai/code-review-action@v1 # Puedes usar alternativas como 'coderabbitai' configurado con API personalizada
        with:
          api_key: ${{ secrets.GROQ_API_KEY }}
          model: "llama-3.3-70b-versatile"
          # Aquí definimos el comportamiento "rentable" y profesional
          system_prompt: |
            Eres un experto en Data Science y Machine Learning enfocado en apuestas deportivas (MLB). 
            Tu labor es revisar Pull Requests para:
            1. Detectar fugas de datos (data leakage) en los modelos.
            2. Verificar la eficiencia de las peticiones a APIs (evitar rate-limiting).
            3. Asegurar que el manejo de probabilidades y Expected Value (EV) sea matemáticamente correcto.
            4. Proponer refactorizaciones para que el código sea más modular y ligero (ideal para ejecución móvil).
            5. Mantener la seguridad: nunca sugerir credenciales en el código.
